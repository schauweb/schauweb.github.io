<!DOCTYPE html>
<html dir="ltr" lang="en">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<meta name="viewport" content="width=device-width">
	<title>Links</title>
	<link rel="icon" href="/l/links.png" type="image/png">
<style>
body {
	font-family: arial, sans-serif;
	font-size: 11vw;
}

div {
	width: 98%;
	margin: 0 auto;
}

a {
	width: 100%;
	text-align: center;
	text-decoration: none;
	border-radius: 16px;
	display: inline-block;
	cursor: pointer;
	font-weight: bold;
	margin: 0 auto 0.5em auto;
}

a.purple, a.purple:active, a.purple:hover, a.purple:visited {
	box-shadow: inset 0px 1px 0px 0px #efdcfb;
	background: linear-gradient(to bottom, #dfbdfa 5%, #8a50ba 100%);
	background-color: #dfbdfa;
	border: 1px solid #c584f3;
	color: white;
	text-shadow: 0px 1px 0px #9752cc;
}

a.blue, a.blue:active, a.blue:hover, a.blue:visited {
	box-shadow: inset 0px 1px 0px 0px #dcecfb;
	background: linear-gradient(to bottom, #bbdbfa 5%, #80b5ea 100%);
	background-color: #bbdbfa;
	border: 1px solid #804bf3;
	color: white;
	text-shadow: 0px 1px 0px #528ecc;
}

a.olive, a.olive:active, a.olive:hover, a.olive:visited {
	box-shadow: inset 0px 1px 0px 0px #f2fadc;
	background: linear-gradient(to bottom, #dbe6c4 5%, #9ba892 100%);
	background-color: #dbe6c4;
	border: 1px solid #d2b8ad;
	color: white;
	text-shadow: 0px 1px 0px #ced9bf;
}

a.red, a.red:active, a.red:hover, a.red:visited {
	box-shadow: inset 0px 1px 0px 0px #f7c5c0;
	background: linear-gradient(to bottom, #fc8d83 5%, #e4685d 100%);
	background-color: #fc8d83;
	border: 1px solid #d83526;
	color: white;
	text-shadow: 0px 1px 0px #b23e35;
}

a.orange, a.orange:active, a.orange:hover, a.orange:visited {
	box-shadow: inset 0px 1px 0px 0px #fff6af;
	background: linear-gradient(to bottom, #ffec64 5%, #ffab23 100%);
	background-color: #ffec64;
	border: 1px solid #ffaa26;
	color: white;
	text-shadow: 0px 1px 0px #ffee66;
}
</style>
</head>
<body>
	<div>
		<a href="https://opskrifter.schau.dk" class="orange">Opskrifter</a>
		<a href="https://www.bt.dk/" class="purple">BT</a>
		<a href="https://ekstrabladet.dk/" class="purple">EB</a>
		<a href="https://holdsport.dk" class="olive">Holdsport</a>
		<a href="https://bschau.github.io/" class="blue">bschau</a>
		<a href="https://www.wikihow.com/Play-With-Pok%C3%A9mon-Cards" class="olive">Pokemon regler</a>
		<a href="https://bschau.github.io/p/index.html" class="red">Personlig</a>
		<a href="https://jonathan.schau.dk/" class="orange">Funko Pops</a>
		<a href="https://bschau.github.io/butt-and-gut.gif" class="olive">Butt &amp; Gut</a>
	</div>
</body>
</html>
